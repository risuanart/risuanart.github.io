  <main class="product-page work">

    <!-- 頁首：只負責定調與指路，不揭露版本規格差異。九宮格動畫沿用首頁預覽面板同一套
         CSS／拼貼圖，這裡額外把其中一格（col:1,row:1）換成真的影片，取代拼貼圖切片，
         data-autoplay 讓動畫在頁面載入後自動播放一次，不用等使用者先點（見 product-gallery.js
         的 initMoodboard()）。影片是 <video> 一般 HTML 屬性，相對路徑以這份 HTML 檔案本身為準
         （跟 --moodboard-src 那個 CSS url() 的解析基準不同，不要混用同一套 ../ 假設）。 -->
    <section class="intro-hero">
      <div class="moodboard" data-autoplay role="button" tabindex="0" aria-label="播放開場動畫"
           style="--moodboard-src: url('../assets/images/products/fluid-art/RS_01_主圖片_w1080xh1920拷貝.jpg')">
        <span class="moodboard__cell" style="--col:0; --row:0; --i:0"></span>
        <span class="moodboard__cell" style="--col:1; --row:0; --i:1" data-flicker></span>
        <span class="moodboard__cell" style="--col:2; --row:0; --i:2"></span>
        <span class="moodboard__cell" style="--col:0; --row:1; --i:3"></span>
        <span class="moodboard__cell" style="--col:1; --row:1; --i:4" data-video>
          <video src="../assets/images/products/fluid-art/RS_video-gold-sticker.mp4" autoplay muted loop playsinline aria-label="金色字貼近拍，實際手貼上畫布的過程"></video>
        </span>
        <span class="moodboard__cell" style="--col:2; --row:1; --i:5" data-flicker></span>
        <span class="moodboard__cell" style="--col:0; --row:2; --i:6"></span>
        <span class="moodboard__cell" style="--col:1; --row:2; --i:7"></span>
        <span class="moodboard__cell" style="--col:2; --row:2; --i:8"></span>
        <span class="moodboard__cell" style="--col:0; --row:3; --i:9" data-flicker></span>
        <span class="moodboard__cell" style="--col:1; --row:3; --i:10"></span>
        <span class="moodboard__cell" style="--col:2; --row:3; --i:11"></span>
      </div>

      <p class="intro-hero__tagline">倒入顏料，讓流動帶出色彩的變化。<br>無法復刻的作品，這是這個新年，只此一次的手作體驗。</p>
